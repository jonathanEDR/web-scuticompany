    <!-- ⚡ GTM + GA4 DIFERIDO - Se cargan después del render inicial para no bloquear LCP -->
    <script>
      // Inicializar dataLayer inmediatamente (necesario para GTM)
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      
      // Diferir carga de GTM y GA4 hasta que el navegador esté idle
      function loadAnalytics() {
        // Google Tag Manager
        (function(w,d,s,l,i){w[l].push({'gtm.start':
        new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
        j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
        'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
        })(window,document,'script','dataLayer','GTM-KBF4RX89');
        
        // Google Analytics 4
        var ga=document.createElement('script');ga.async=true;
        ga.src='https://www.googletagmanager.com/gtag/js?id=G-NQB8D9SHKX';
        document.head.appendChild(ga);
        gtag('js', new Date());
        gtag('config', 'G-NQB8D9SHKX');
      }
      
      // Cargar analytics después de que el contenido principal esté listo
      if ('requestIdleCallback' in window) {
        requestIdleCallback(loadAnalytics, { timeout: 3000 });
      } else {
        setTimeout(loadAnalytics, 2500);
      }
    </script>

    <!-- Google Search Console Verification -->
    <meta name="google-site-verification" content="google96cb30ebe99b22ed" />

    <!-- ⚡ Critical CSS inline - RENDER INMEDIATO sin bloqueo -->
    <style>
      /* Critical CSS - Estilos mínimos para First Contentful Paint */
      :root{--bg-primary:#0a0a0a;--text-primary:#ffffff;--accent:#7c3aed}
      *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
      html{line-height:1.5;-webkit-text-size-adjust:100%;scroll-behavior:smooth}
      /* Fallback fonts con métricas similares a Inter/Montserrat para evitar CLS */
      body{font-family:Inter,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg-primary);color:var(--text-primary);min-height:100vh}
      /* Navegación usa Montserrat - fallback a system fonts con métricas similares */
      nav[role="navigation"]{font-family:Montserrat,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
      #root{min-height:100vh;display:flex;flex-direction:column}
      /* Loading state */
      .loading-spinner{display:flex;align-items:center;justify-content:center;min-height:100vh}
      .loading-spinner::after{content:'';width:40px;height:40px;border:3px solid rgba(124,58,237,.3);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
      @keyframes spin{to{transform:rotate(360deg)}}
      /* Above the fold - Header placeholder */
      header{height:64px;background:rgba(10,10,10,.95);backdrop-filter:blur(8px);position:sticky;top:0;z-index:50}
      /* Hero section placeholder */
      .hero-placeholder{min-height:80vh;display:flex;align-items:center;justify-content:center}
    </style>
